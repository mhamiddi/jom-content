<!DOCTYPE html>
<html lang="ms" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jom Content — Social Media Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f8fafc;--surface:#fff;--surface2:#f1f5f9;--surface3:#e8ecf4;--text:#1a1d23;--text2:#5f6779;--text3:#9ca3af;--border:#e2e6ef;--border-light:#edeff5;--primary:#1E3A8A;--primary-light:#3b5fbf;--primary-lighter:#6b8fd4;--primary-bg:#eef1ff;--primary-soft:#eef1ff;--primary-glow:rgba(30,58,138,0.15);--success:#16a34a;--success-bg:#dcfce7;--danger:#dc2626;--danger-bg:#fee2e2;--warning:#d97706;--warning-bg:#fef3c7;--shadow-sm:0 1px 2px rgba(0,0,0,.05);--shadow:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.1);--shadow-lg:0 8px 24px rgba(0,0,0,.12);--shadow-xl:0 12px 40px rgba(0,0,0,.15);--radius:12px;--radius-sm:8px;--radius-xs:6px;--radius-lg:16px;--radius-full:999px;--sidebar-w:220px;--trans:.25s cubic-bezier(0.22,1,0.36,1);--trans-fast:.15s ease;--trans-slow:.4s cubic-bezier(0.22,1,0.36,1);--font:Inter,Segoe\ UI,system-ui,-apple-system,sans-serif;--space-xs:4px;--space-sm:8px;--space-md:16px;--space-lg:24px;--space-xl:32px;--space-2xl:40px;--space-3xl:48px}
[data-theme="dark"]{--bg:#0f1117;--surface:#1a1d28;--surface2:#222640;--text:#e8eaf0;--text2:#989fba;--border:#2a2e40;--primary:#4f7cff;--primary-light:#7a9eff;--primary-bg:#1a2244;--shadow:0 1px 3px rgba(0,0,0,.3);--surface3:#2a2e42;--text3:#6b7280;--border-light:#2a2e40;--primary-lighter:#a3baff;--primary-soft:#1a2244;--primary-glow:rgba(79,124,255,0.2);--success:#4ade80;--success-bg:#1a2e1a;--danger:#f87171;--danger-bg:#2e1a1a;--warning:#fbbf24;--warning-bg:#2e2a1a;--shadow-sm:0 1px 2px rgba(0,0,0,.2);--shadow-md:0 4px 12px rgba(0,0,0,.4);--shadow-lg:0 8px 24px rgba(0,0,0,.45);--shadow-xl:0 12px 40px rgba(0,0,0,.5)}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--trans),color var(--trans);overflow-x:hidden;width:100%}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* SIDEBAR */
.sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:linear-gradient(180deg,#1E3A8A 0%,#162a6b 100%);color:#fff;z-index:200;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;transition:transform var(--trans),width var(--trans);box-shadow:2px 0 20px rgba(30,58,138,.25)}
[data-theme="dark"] .sidebar{background:linear-gradient(180deg,#121830 0%,#0d1225 100%)}
.sidebar-logo{padding:var(--space-xl) var(--space-xl) var(--space-lg);display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;letter-spacing:-.3px;border-bottom:1px solid rgba(255,255,255,.12);flex-shrink:0}
.sidebar-logo svg{width:28px;height:28px;flex-shrink:0}
.sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:var(--space-md) var(--space-sm);flex:1}
.nav-tab{display:flex;align-items:center;gap:var(--space-sm);padding:var(--space-sm) var(--space-md);border:none;border-radius:var(--radius-sm);background:transparent;color:rgba(255,255,255,.6);font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:all var(--trans);white-space:nowrap;width:100%;border-left:3px solid transparent;position:relative}
.nav-tab:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85)}
.nav-tab.active{background:rgba(255,255,255,.14);color:#fff;font-weight:600;border-left-color:rgba(255,255,255,.8)}
.nav-tab svg{width:16px;height:16px;flex-shrink:0;opacity:.7;transition:opacity var(--trans)}
.nav-tab.active svg{opacity:1}
.nav-tab[data-tab="tiktok"].active{border-left-color:#fe2c55}
.nav-tab[data-tab="facebook"].active{border-left-color:#1877f2}
.nav-tab[data-tab="instagram"].active{border-left-color:#e4405f}
.nav-tab[data-tab="threads"].active{border-left-color:#aaa}
.tab-badge{margin-left:auto;background:rgba(255,255,255,.15);color:#fff;border-radius:var(--radius-full);padding:1px 7px;font-size:10px;font-weight:700;min-width:20px;text-align:center;transition:all var(--trans)}
.nav-tab.active .tab-badge{background:rgba(255,255,255,.28);transform:scale(1.05)}

/* APP BODY */
.app-body{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}

/* TOP BAR */
.top-bar{background:var(--surface);border-bottom:1px solid var(--border-light);position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm);backdrop-filter:blur(8px)}
.top-bar-inner{padding:0 var(--space-2xl);display:flex;align-items:center;height:60px;gap:var(--space-md)}
.hamburger{display:none;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 9px;cursor:pointer;color:var(--text);align-items:center;justify-content:center;transition:all var(--trans)}.hamburger:hover{background:var(--primary-soft)}
.page-title{font-size:16px;font-weight:700;color:var(--text)}
.top-bar-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.header-stats{display:flex;gap:16px;font-size:13px;color:var(--text2)}
.header-stats strong{color:var(--text);font-weight:600}
.hdr-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text);transition:all var(--trans);white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.hdr-btn:hover{background:var(--primary-soft);border-color:var(--primary-light);color:var(--primary);transform:translateY(-1px)}.hdr-btn:active{transform:translateY(0)}
.theme-btn{font-size:16px;padding:7px 11px;border-radius:var(--radius-full)}
.theme-btn.spinning{animation:spinTheme .45s ease}
@keyframes spinTheme{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* LAYOUT */
html{overflow-x:hidden}
.section{overflow:hidden}
main{padding:var(--space-2xl);flex:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.tab-content{display:none}.tab-content.active{display:block}
.section{margin-bottom:var(--space-3xl)}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-lg);gap:var(--space-sm);flex-wrap:wrap}
.section-hdr h2{font-size:15px;font-weight:700;letter-spacing:-.2px}
.badge{background:var(--primary-bg);color:var(--primary);padding:3px 10px;border-radius:var(--radius-full);font-size:11px;font-weight:600}
.section-hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* CARDS */
.card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:var(--space-xl);box-shadow:var(--shadow);transition:all var(--trans)}
.card-grid{display:grid;gap:var(--space-md);grid-template-columns:repeat(auto-fit,minmax(165px,1fr))}
.card-stat{text-align:center;padding:var(--space-xl) var(--space-lg);position:relative;overflow:hidden;cursor:default}.card-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary);opacity:.7;transition:opacity var(--trans),height var(--trans)}.card-stat:hover{box-shadow:var(--shadow-lg);transform:translateY(-3px)}.card-stat:hover::before{opacity:1;height:4px}.card-stat.platform-card::before{background:var(--p-color,var(--primary))}
.card-stat .num{font-size:34px;font-weight:800;color:var(--primary);line-height:1;letter-spacing:-1px;transition:transform var(--trans)}.card-stat:hover .num{transform:scale(1.05)}
.card-stat .label{font-size:12px;color:var(--text2);margin-top:5px;font-weight:500}
.card-stat .sub{font-size:11px;color:var(--text3);margin-top:2px}
.stat-change{font-size:12px;font-weight:700;letter-spacing:0;margin-left:5px;vertical-align:middle}.stat-change.up{color:var(--success)}.stat-change.down{color:var(--danger)}.stat-change.same{color:var(--text3)}

/* PLATFORM DOTS */
.platform-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}
[data-theme="dark"] .dot-threads{background:#ccc}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav h3{font-size:15px;font-weight:600}
.cal-nav button{background:var(--surface2);border:1px solid var(--border);padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text);transition:all var(--trans);font-weight:500}.cal-nav button:hover{background:var(--primary-bg);color:var(--primary);border-color:var(--primary-light)}.cal-nav button:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;transition:opacity .22s ease,transform .22s ease;min-width:0}
.cal-grid.cal-slide{opacity:0;transform:translateX(var(--cal-slide-x,18px))}
.cal-day-header{text-align:center;font-size:10px;font-weight:600;color:var(--text3);padding:6px 0;text-transform:uppercase;letter-spacing:.5px}
.cal-day{background:var(--surface2);border-radius:var(--radius-sm);min-height:88px;padding:6px;cursor:pointer;transition:all var(--trans);border:2px solid transparent;position:relative;overflow:hidden}
.cal-day:hover{background:var(--primary-soft);border-color:var(--primary-light);box-shadow:var(--shadow-md);transform:translateY(-2px);z-index:1}
.cal-day.other-month{opacity:.3}
.cal-day.today{border-color:var(--primary);background:var(--primary-bg);box-shadow:0 0 0 3px rgba(30,58,138,.1)}
.cal-day .day-num{font-size:12px;font-weight:700;margin-bottom:3px;color:var(--text)}.cal-day.today .day-num{color:var(--primary)}
.cal-add-btn{display:none;position:absolute;top:2px;right:2px;width:16px;height:16px;padding:0;border:0;border-radius:50%;background:rgba(255,255,255,.8);color:#1f2937;align-items:center;justify-content:center;font-size:13px;font-weight:700;line-height:1;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.16);z-index:2}
.cal-day:hover .cal-add-btn{display:flex}
.post-chip{font-size:10px;padding:3px 6px;border-radius:4px;margin-bottom:2px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;display:block;font-weight:500;border-left:4px solid var(--status-accent,#94a3b8);transition:opacity var(--trans-fast),transform var(--trans-fast);max-width:100%;width:100%;box-sizing:border-box}
.post-chip.status-draft{--status-accent:#94a3b8}.post-chip.status-scheduled{--status-accent:#3b82f6}.post-chip.status-posted{--status-accent:#22c55e}.post-chip.status-failed{--status-accent:#ef4444}
.post-chip:hover{opacity:.85;transform:translateX(2px)}
.more-chip{font-size:10px;color:var(--text2);padding:2px 6px;font-weight:500}

/* PILLARS */
.pillar-bar-wrap{display:flex;align-items:center;gap:var(--space-sm);margin:var(--space-sm) 0;flex-wrap:wrap}
.pillar-tag{font-size:11px;padding:4px 10px;border-radius:var(--radius-full);color:#fff;font-weight:500;display:inline-flex;align-items:center;gap:5px;transition:transform var(--trans-fast)}.pillar-tag:hover{transform:scale(1.03)}
.pillar-tag[draggable="true"]{cursor:grab}.pillar-tag.dragging{opacity:.45}.pillar-tag.drag-over{outline:2px solid var(--primary);outline-offset:2px}
.pillar-color{width:18px;height:18px;padding:0;border:2px solid rgba(255,255,255,.7);border-radius:50%;overflow:hidden;background:transparent;cursor:pointer}.pillar-color::-webkit-color-swatch-wrapper{padding:0}.pillar-color::-webkit-color-swatch{border:0;border-radius:50%}.pillar-color::-moz-color-swatch{border:0;border-radius:50%}
.del-pillar{background:rgba(255,255,255,.25);border:none;color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0;transition:background var(--trans-fast)}
.del-pillar:hover{background:rgba(255,255,255,.45)}
.pillar-dist-row{display:flex;flex-direction:column;gap:var(--space-md);margin-bottom:var(--space-md)}
.pillar-dist-item{display:flex;flex-direction:column;gap:3px}
.pillar-dist-header{display:flex;justify-content:space-between;font-size:12px;align-items:center}
.pillar-dist-header .name{font-weight:600}.pillar-dist-header .pct{font-weight:700;font-variant-numeric:tabular-nums}
.pillar-bar-actual{height:24px;border-radius:6px;overflow:hidden;background:var(--surface3);box-shadow:inset 0 1px 2px rgba(0,0,0,.05)}
.pillar-bar-actual .fill{height:100%;border-radius:6px;transition:width .5s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;min-width:24px;box-shadow:inset 0 1px 0 rgba(255,255,255,.2)}
.pillar-bar-target{height:3px;border-radius:2px;background:var(--surface3);margin-top:2px}
.pillar-bar-target .fill{height:100%;border-radius:2px;opacity:.35}
.pillar-target-label{font-size:9px;color:var(--text3);text-align:right;font-weight:500}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.pill-filter{font-size:11px;padding:5px 12px;border-radius:var(--radius-full);border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text);font-weight:500;transition:all var(--trans)}
.pill-filter:hover{background:var(--surface2);border-color:var(--primary-light)}
.pill-filter.active{color:#fff;border-color:transparent;box-shadow:var(--shadow-sm)}

/* SEARCH */
.search-wrap{margin-bottom:var(--space-md)}
.search-wrap.inline{max-width:100%;flex:1;min-width:0}.search-input-wrap{position:relative;max-width:340px}.search-input-wrap .search-icon{position:absolute;left:var(--space-md);top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.search-input{width:100%;max-width:340px;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;transition:all var(--trans)}
.search-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(30,58,138,.1)}

/* APPROVAL BADGES */
.approval-badge{font-size:9px;padding:2px 6px;border-radius:var(--radius-full);font-weight:600;white-space:nowrap}
.approval-approved{background:#dcfce7;color:#15803d}
.approval-pending{background:#fef3c7;color:#b45309}
[data-theme="dark"] .approval-approved{background:#1a2e1a;color:#4ade80}
[data-theme="dark"] .approval-pending{background:#2e2a1a;color:#fbbf24}

/* POST LIST */
.post-list{display:flex;flex-direction:column;gap:8px}
.post-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:var(--space-sm) var(--space-md);cursor:pointer;display:flex;align-items:center;gap:6px;transition:all var(--trans);box-shadow:var(--shadow-sm);position:relative}.post-item:hover{border-color:var(--primary-light);background:var(--primary-bg);box-shadow:var(--shadow-md);transform:translateY(-2px)}.post-item::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;border-radius:0 2px 2px 0;opacity:0;background:var(--primary);transition:opacity var(--trans)}.post-item:hover::before{opacity:1}
.post-item.posted::before{background:var(--success);opacity:.5}.post-item.posted:hover::before{opacity:1}
.post-item.scheduled::before{background:var(--primary);opacity:.5}.post-item.scheduled:hover::before{opacity:1}
.post-item.failed::before{background:var(--danger);opacity:.5}.post-item.failed:hover::before{opacity:1}
.p-date{font-size:11px;color:var(--text3);white-space:nowrap;flex-shrink:0;font-weight:500;min-width:90px}
.p-title{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-pillar{font-size:10px;padding:2px 7px;border-radius:var(--radius-full);color:#fff;font-weight:600;white-space:nowrap;flex-shrink:0}
.p-status{font-size:10px;padding:2px 7px;border-radius:var(--radius-full);font-weight:600;white-space:nowrap;flex-shrink:0}
.status-draft{background:var(--surface3);color:var(--text2)}
.status-scheduled{background:var(--primary-soft);color:var(--primary)}
.status-posted{background:var(--success-bg);color:var(--success)}
.status-failed{background:var(--danger-bg);color:var(--danger)}
[data-theme="dark"] .status-draft{background:#2a2e3a;color:#9ca3af}
[data-theme="dark"] .status-scheduled{background:#1a2a4a;color:#60a5fa}
[data-theme="dark"] .status-posted{background:#1a2e1a;color:#4ade80}
[data-theme="dark"] .status-failed{background:#2e1a1a;color:#f87171}

/* SCROLL ANIMATIONS */
.animate-on-scroll{opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease}.animate-on-scroll.visible{opacity:1;transform:translateY(0)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:var(--space-3xl) var(--space-xl);color:var(--text2);max-width:320px;margin:0 auto}
.empty-state .icon{margin-bottom:var(--space-md);opacity:.6}
.empty-state .icon svg{width:56px;height:56px}
.empty-state p{font-size:13px;line-height:1.5}
.empty-state .btn{margin-top:var(--space-md)}

/* CHART */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-lg)}
.chart-card h3{font-size:13px;font-weight:600;margin-bottom:var(--space-md)}
.chart-card canvas{display:block;margin:0 auto}
.chart-legend{display:flex;flex-wrap:wrap;gap:var(--space-sm);margin-top:var(--space-sm)}
.chart-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.chart-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chart-legend-item strong{color:var(--text)}
canvas{display:block;max-width:100%}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm)}
.skeleton-stat{height:100px;border-radius:var(--radius)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}


/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:none;align-items:flex-start;justify-content:center;padding:var(--space-xl);overflow-y:auto;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease}
.modal{background:var(--surface);border-radius:var(--radius-lg);max-width:580px;width:100%;padding:var(--space-2xl);margin:auto;box-shadow:var(--shadow-xl);animation:modalIn .3s cubic-bezier(.16,1,.3,1);max-height:min(90vh,640px);overflow-y:auto}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(-12px)}to{opacity:1;transform:none}}@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal h3{font-size:17px;font-weight:700;margin-bottom:var(--space-lg);letter-spacing:-.2px}
.form-group{margin-bottom:var(--space-lg)}
.form-group label{font-size:12px;font-weight:600;color:var(--text2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-group input[type="text"],.form-group input[type="date"],.form-group input[type="time"],.form-group input[type="number"],.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;transition:all var(--trans)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(30,58,138,.08)}
.form-group input.field-error{border-color:var(--danger);box-shadow:0 0 0 3px rgba(220,38,38,.1)}
.field-error-message{display:none;margin-top:5px;color:var(--danger);font-size:11px;font-weight:500}.field-error-message.visible{display:block}
.form-group textarea{min-height:80px;resize:vertical}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--space-md)}

.approved-row{padding-top:4px}
.approved-label{display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text);user-select:none;padding:6px 0}
.approved-label input[type="checkbox"]{display:none}
.approved-label .checkmark{width:20px;height:20px;border:2px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all var(--trans);flex-shrink:0;background:var(--surface)}
.approved-label input:checked+.checkmark{background:var(--primary);border-color:var(--primary)}
.approved-label input:checked+.checkmark::after{content:'';width:6px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
.approved-label:hover .checkmark{border-color:var(--primary-light)}
.modal-actions{display:flex;align-items:center;gap:6px;margin-top:var(--space-xl);padding-top:var(--space-lg);border-top:1px solid var(--border-light);flex-wrap:wrap}
.modal-actions-spacer{flex:1}
.modal-actions-left,.modal-actions-right{display:flex;align-items:center;gap:var(--space-sm)}

.media-upload-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.media-upload-row input[type="text"]{padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text)}

.media-type-select{width:auto;min-width:100px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);font-family:inherit;cursor:pointer;transition:border-color var(--trans)}
.media-type-select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(30,58,138,.08)}
.media-input-area{display:flex;gap:8px;flex:1;min-width:0;flex-wrap:wrap;align-items:center;overflow:hidden}
.media-url-row{display:flex;gap:8px;flex:1;min-width:0}
.media-url-row input[type="text"]{flex:1;min-width:120px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);font-family:inherit}
.media-url-row input[type="text"]:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(30,58,138,.08)}
.media-upload-btn{display:inline-flex!important;align-items:center}
.media-preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:var(--space-sm);margin-top:var(--space-sm)}
.media-thumb{position:relative;width:90px;height:90px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform var(--trans),box-shadow var(--trans);background:var(--surface3)}
.media-thumb:hover{transform:scale(1.05);box-shadow:var(--shadow-md)}.media-thumb img{width:100%;height:100%;object-fit:cover}
.media-thumb .del-media{position:absolute;top:-3px;right:-3px;width:20px;height:20px;border-radius:50%;background:var(--danger);color:#fff;font-size:12px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;box-shadow:var(--shadow);transition:transform var(--trans-fast)}.media-thumb .del-media:hover{transform:scale(1.15)}

/* BUTTONS */
.btn{padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all var(--trans);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;letter-spacing:-.1px}.btn:hover{transform:translateY(-1px)}.btn:active{transform:translateY(0)}.btn:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(30,58,138,.25)}.btn-primary:hover{background:var(--primary-light);box-shadow:0 4px 16px rgba(30,58,138,.35)}
.btn-outline{background:var(--surface);border:1px solid var(--border);color:var(--text)}.btn-outline:hover{background:var(--surface2);border-color:var(--primary-light)}
.btn-danger{background:var(--danger);color:#fff;box-shadow:0 2px 8px rgba(220,38,38,.25)}.btn-danger:hover{background:#b91c1c;box-shadow:0 4px 16px rgba(220,38,38,.35)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-ghost{background:transparent;border:none;color:var(--text2);padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all var(--trans);display:inline-flex;align-items:center;gap:6px;white-space:nowrap;letter-spacing:-.1px}
.btn-ghost:hover{color:var(--text);background:var(--surface2)}
.btn-danger-ghost{background:transparent;border:none;color:var(--danger);padding:6px 12px;font-size:12px;border-radius:var(--radius-sm);font-weight:600;cursor:pointer;transition:all var(--trans);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-danger-ghost:hover{background:var(--danger-bg)}
.btn-ghost.btn-sm{padding:6px 12px;font-size:12px}

/* TOAST */
#toastWrap{position:fixed;bottom:var(--space-2xl);right:var(--space-2xl);z-index:600;display:flex;flex-direction:column;gap:var(--space-sm);pointer-events:none}
.toast{background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:var(--radius-sm);padding:var(--space-md) var(--space-lg);font-size:13px;font-weight:500;color:var(--text);box-shadow:var(--shadow-lg);animation:toastSlideIn .3s cubic-bezier(.16,1,.3,1);pointer-events:auto;min-width:220px;max-width:340px;display:flex;align-items:center;gap:var(--space-sm)}.toast::before{font-size:16px;flex-shrink:0}
.toast.success{border-left-color:var(--success);--toast-icon:'\2713'}.toast.error{border-left-color:var(--danger);--toast-icon:'\2717'}
@keyframes toastIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateX(16px)}}
.toast.out{animation:toastOut .25s ease forwards}
.toast-action{margin-left:auto;border:0;background:transparent;color:var(--primary);font:inherit;font-weight:700;cursor:pointer;padding:3px 5px}

/* POST PREVIEW */
.preview-overlay{position:fixed;inset:0;background:rgba(8,10,18,.78);z-index:500;display:none;align-items:center;justify-content:center;padding:var(--space-xl);backdrop-filter:blur(5px)}.preview-overlay.open{display:flex;animation:fadeIn .2s ease}
.social-preview{background:var(--surface);color:var(--text);width:min(520px,100%);max-height:90vh;overflow:auto;border-radius:18px;padding:var(--space-xl);box-shadow:var(--shadow-xl);position:relative}.preview-close{position:absolute;right:14px;top:12px;border:0;background:var(--surface2);color:var(--text);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:18px}.preview-meta{font-size:12px;color:var(--text2);margin:8px 0 14px}.preview-caption{font-size:14px;line-height:1.55;white-space:pre-wrap;margin:12px 0}.preview-media{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:14px}.preview-media img,.preview-media video{width:100%;height:190px;object-fit:cover;border-radius:10px;background:var(--surface3)}

/* PILLAR ADD */
.pillar-add-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:8px}
.pillar-add-row input{padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);font-family:inherit}
.pillar-add-row input:focus{outline:none;border-color:var(--primary)}


/* KBD HINT */
.kbd-hint{position:fixed;bottom:var(--space-lg);left:calc(var(--sidebar-w) + var(--space-lg));z-index:50;background:var(--surface);border:1px solid var(--border);padding:6px 12px;border-radius:var(--radius-full);font-size:11px;color:var(--text3);box-shadow:var(--shadow-sm);transition:opacity .3s;display:flex;align-items:center;gap:6px;opacity:.7}.kbd-hint:hover{opacity:1}.kbd-hint kbd{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-family:inherit;font-size:10px;font-weight:600;color:var(--text)}
.api-loading{position:fixed;top:0;left:0;right:0;height:3px;z-index:700;opacity:0;pointer-events:none;background:linear-gradient(90deg,transparent,var(--primary),transparent);background-size:200% 100%;transition:opacity .15s}.api-loading.active{opacity:1;animation:apiLoading 1s linear infinite}@keyframes apiLoading{to{background-position:-200% 0}}

/* RESPONSIVE */
@media(max-width:768px){
    :root{--sidebar-w:0}
    .sidebar{transform:translateX(-100%);width:260px}
    .sidebar.open{transform:translateX(0)}
    .sidebar-overlay.open{display:block}
    .app-body{margin-left:0}
    .hamburger{display:flex}
    .chart-row{grid-template-columns:1fr}
    .header-stats{gap:8px;font-size:11px}
    .cal-day{min-height:60px;padding:4px;position:relative;overflow:hidden}
    .cal-grid{gap:3px}
    .cal-day-header{font-size:9px;padding:4px 0}
    .post-chip{font-size:9px;padding:2px 4px}
    .cal-add-btn{display:flex}
    .modal{padding:var(--space-lg);border-radius:var(--radius)}
    .card-grid{grid-template-columns:repeat(2,1fr)}
    .post-item{gap:var(--space-xs)}
    .post-item,.cal-day,.nav-tab{min-height:44px}
    .p-date{min-width:60px;font-size:10px}
    .p-title{font-size:12px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .kbd-hint{display:none}
    .media-preview{grid-template-columns:repeat(auto-fill,minmax(70px,1fr))}
    .media-thumb{width:70px;height:70px}
    main{padding:var(--space-xl)}
    .top-bar-inner{padding:0 var(--space-lg)}
    .section-hdr-right .search-input{max-width:100%;min-width:0}
    .filter-bar{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;padding-bottom:4px}
  }
  @media(max-width:480px){
    .header-stats{display:none}
    main{padding:var(--space-md)}
    .card-grid{grid-template-columns:repeat(2,1fr);gap:var(--space-sm)}
    .card-stat{padding:var(--space-md) var(--space-sm)}
    .card-stat .num{font-size:26px}
    .card-stat .label{font-size:11px}
    .card-stat .sub{font-size:10px}
    .section-hdr h2{font-size:14px}
    .hdr-btn span{display:none}
    #toastWrap{bottom:var(--space-md);right:var(--space-md)}
    .cal-day{min-height:52px;padding:3px;overflow:hidden}
    .cal-nav{flex-wrap:wrap;gap:4px;justify-content:center}
    .cal-nav h3{font-size:13px;order:-1;width:100%;text-align:center}
    .cal-nav button{font-size:12px;padding:5px 10px}
    .cal-grid{gap:2px}
    .post-chip{font-size:8px;padding:2px 4px;max-width:100%}
    .cal-day .day-num{font-size:10px;margin-bottom:1px}
    .cal-nav{flex-wrap:wrap;gap:4px;justify-content:center}
    .cal-nav h3{font-size:13px;order:-1;width:100%;text-align:center}
    .cal-nav button{font-size:12px;padding:5px 10px}
    .cal-day-header{font-size:8px;padding:3px 0}
    .cal-day .day-num{font-size:11px}
    .post-chip{font-size:8px;padding:1px 3px}
    .modal{padding:var(--space-lg)}
        .form-row{grid-template-columns:1fr 1fr}
    .top-bar-inner{padding:0 var(--space-md)}
    .search-input-wrap{max-width:100%}
    .section-hdr-right .search-input{max-width:100%;min-width:0}
    .section-hdr-right{flex-wrap:wrap}
    .filter-bar{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;padding-bottom:4px}
    .filter-bar .pill-filter{white-space:nowrap;flex-shrink:0}
    .post-item{flex-wrap:wrap;gap:4px}
    .post-item .p-date{min-width:auto}
    .post-item .p-title{min-width:auto;font-size:13px}
    .nav-tab{padding:12px var(--space-md)}
    .btn{padding:10px 14px;font-size:14px}
    .pillar-tag{padding:5px 10px;font-size:12px}
    .pillar-add-row input{max-width:100%;width:auto;flex:1}
    .modal-actions .btn{font-size:12px;padding:6px 10px}
    .form-group{margin-bottom:var(--space-md)}
    .modal h3{margin-bottom:var(--space-lg)}
    .media-upload-row .btn{font-size:11px;padding:4px 8px}
    #mImgUrl,#mVideoUrl{font-size:12px}
  }
</style>
</head>

    <div class="form-group"><label>Content Pillar</label><select id="mPillar"></select></div>
    <div class="form-group">
      <label>Status</label>
      <select id="mStatus">
        <option value="draft">Draft</option>
        <option value="scheduled">Scheduled</option>

        <button class="btn btn-sm btn-outline media-upload-btn" onclick="document.getElementById('mFileInput').click()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:3px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>

        </button>

        <input type="text" id="mVideoUrl" placeholder="Tampal link video (Google Drive, YouTube, etc)...">
        <button class="btn btn-sm btn-primary" onclick="addVideoUrl()">Tambah</button>

      <button class="btn btn-danger-ghost btn-sm" id="mDeleteBtn" onclick="deletePost()" style="display:none">Padam</button>
      <button class="btn btn-ghost btn-sm" id="mDupeBtn" onclick="duplicatePost()" style="display:none">Duplikat</button>
      <div class="modal-actions-spacer"></div>
      <button class="btn btn-ghost" onclick="closeModal()">Batal</button>

</div>

<div class="preview-overlay" id="previewOverlay" onclick="if(event.target===this)closePostPreview()">
  <div class="social-preview" id="previewCard"></div>
</div>

<script>
/* ===== CONSTANTS ===== */
const PLATFORMS = ['tiktok','facebook','instagram','threads'];
const PLATFORM_NAMES = {tiktok:'TikTok',facebook:'Facebook',instagram:'Instagram',threads:'Threads'};
const PLATFORM_COLORS = {tiktok:'#fe2c55',facebook:'#1877f2',instagram:'#e4405f',threads:'#888'};
const PLATFORM_ICONS = {tiktok:'TikTok',facebook:'Facebook',instagram:'Instagram',threads:'Threads'};
const PAGE_TITLES = {dashboard:'Dashboard',tiktok:'TikTok',facebook:'Facebook',instagram:'Instagram',threads:'Threads'};
const DEFAULT_PILLARS = ['Kulit','Weight Loss','General Care'];
const DEFAULT_TARGETS = {'Kulit':50,'Weight Loss':30,'General Care':20};
const PILLAR_COLORS = ['#6366f1','#f59e0b','#06b6d4','#ec4899','#8b5cf6','#14b8a6','#f97316','#a855f7'];

/* ===== CANVAS POLYFILL ===== */
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
    let r = Array.isArray(radii) ? radii : [radii||0,radii||0,radii||0,radii||0];
    const [tl=0,tr=0,br=0,bl=0] = r;
    this.moveTo(x+tl, y);
    this.lineTo(x+w-tr, y);
    tr ? this.quadraticCurveTo(x+w,y,x+w,y+tr) : this.lineTo(x+w,y);
    this.lineTo(x+w, y+h-br);
    br ? this.quadraticCurveTo(x+w,y+h,x+w-br,y+h) : this.lineTo(x+w,y+h);
    this.lineTo(x+bl, y+h);
    bl ? this.quadraticCurveTo(x,y+h,x,y+h-bl) : this.lineTo(x,y+h);
    this.lineTo(x, y+tl);
    tl ? this.quadraticCurveTo(x,y,x+tl,y) : this.lineTo(x,y);
    this.closePath();
  };
}

/* ===== STATE ===== */
let state = {posts:[],pillars:{},pillarColors:{},calDates:{},pillarTargets:{},currentTab:'dashboard',pillarFilters:{}};

/* ===== API ===== */
const API_BASE = '/api/posts';
let apiRequestsInFlight = 0;
function setApiLoading(loading) {
  apiRequestsInFlight = Math.max(0, apiRequestsInFlight + (loading ? 1 : -1));
  const indicator = document.getElementById('apiLoading');
  if (indicator) {
    indicator.classList.toggle('active', apiRequestsInFlight > 0);
    indicator.setAttribute('aria-hidden', apiRequestsInFlight > 0 ? 'false' : 'true');
  }
}
async function apiFetch(method, body, id) {
  const url = id ? API_BASE+'/'+id : API_BASE;
  setApiLoading(true);
  try {
    let lastError;
    for (let attempt = 1; attempt <= 3; attempt++) {
      try {
        const res = await fetch(url, {
          method,
          headers: {'Content-Type':'application/json'},
          body: body ? JSON.stringify(body) : undefined
        });
        if (!res.ok) throw new Error('HTTP '+res.status);
        return await res.json();
      } catch (e) {
        lastError = e;
        if (attempt < 3) await new Promise(resolve => setTimeout(resolve, 250 * attempt));
      }
    }
    return {success:false,error:lastError ? lastError.message : 'API request failed'};
  } finally {
    setApiLoading(false);
  }
}
async function apiSyncPost(post, method) {
  if (method==='DELETE') return apiFetch('DELETE',null,post.id);
  if (post.id && (method==='PUT'||!method)) return apiFetch('PUT',post,post.id);
  return apiFetch('POST',post);
}
async function apiFetchAll() {
  const res = await apiFetch('GET');
  if (res.success && Array.isArray(res.data)) {
    // Merge API posts with local — API is authoritative for existing IDs
    const apiIds = new Set(res.data.map(p=>p.id));
    state.posts = state.posts.filter(p => !apiIds.has(p.id) || p._localOnly);
    state.posts = [...res.data, ...state.posts];
    saveState();
    renderAll();
  }
}

/* ===== DATE HELPERS ===== */
function localDateStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function todayStr() { return localDateStr(new Date()); }
function parseLocalDate(s) {
  if (!s) return new Date();
  const [y,m,d] = s.split('-');
  return new Date(+y, +m-1, +d);
}
function getDateKey(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function parseDateKey(k) { const p=k.split('-'); return {year:+p[0],month:+p[1]-1}; }

/* ===== UTIL ===== */
function esc(s) {
  return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatDate(d) {
  if (!d) return '';
  var p = d.split('-');
  if (p.length!==3) return d;
  var m = ['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogos','Sep','Okt','Nov','Dis'];
  return parseInt(p[2],10)+' '+(m[parseInt(p[1],10)-1]||p[1]);
}
function getPillarColor(name) {
  if (state.pillarColors && state.pillarColors[name]) return state.pillarColors[name];
  const colors = PILLAR_COLORS;
  let hash = 0;
  for (let i=0;i<(name||'').length;i++) hash = name.charCodeAt(i)+((hash<<5)-hash);
  return colors[Math.abs(hash)%colors.length];
}
function mediaIndicator(images) {
  if (!images || !images.length) return '';
  const hasVideo = images.some(i => i.type === 'video');
  const hasImage = images.some(i => i.type === 'image');
  if (hasVideo && hasImage) return '<span class="p-img-indicator" title="Ada video & gambar">📷🎬</span>';
  if (hasVideo) return '<span class="p-img-indicator" title="Ada video">🎬</span>';
  return '<span class="p-img-indicator" title="Ada gambar">📷</span>';
}
function cssVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}
const searchTimers = {};
function debounceSearch(scope) {
  clearTimeout(searchTimers[scope]);
  searchTimers[scope] = setTimeout(() => {
    if (scope === 'dashboard') renderDashTimeline();
    else renderPostList(scope);
  }, 200);
}

/* ===== STORAGE ===== */
function loadState() {
  try {
    const raw = localStorage.getItem('jomContent');
    if (raw) {
      const s = JSON.parse(raw);
      state.posts = Array.isArray(s.posts) ? s.posts : [];
      state.pillars = s.pillars || {};
      state.pillarColors = s.pillarColors || {};
      state.calDates = s.calDates || {};
      state.pillarTargets = s.pillarTargets || {};
    }
  } catch(e) { console.warn('loadState:', e); }
  PLATFORMS.forEach(p => {
    if (!state.pillars[p]) state.pillars[p] = [...DEFAULT_PILLARS];
    if (!state.calDates[p]) state.calDates[p] = getDateKey(new Date());
    if (!state.pillarTargets[p]) state.pillarTargets[p] = {...DEFAULT_TARGETS};
    if (!state.pillarFilters[p]) state.pillarFilters[p] = 'all';
  });
}

function saveState() {
  const data = JSON.stringify({posts:state.posts,pillars:state.pillars,pillarColors:state.pillarColors,calDates:state.calDates,pillarTargets:state.pillarTargets});
  try { localStorage.setItem('jomContent', data); } catch(e) { showToast('Storan penuh!','error'); return; }
  try { localStorage.setItem('jomContent_bak'+(Math.floor(Date.now()/60000)%3+1), data); } catch(e) {}
}

function getTargets(platform) {
  return (state.pillarTargets && state.pillarTargets[platform]) || DEFAULT_TARGETS;
}

/* ===== TOAST ===== */
function showToast(msg, type) {
  if (!type) type = 'info';
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  const icons = {success: '✓', error: '✗', info: 'ℹ'};
  const icon = icons[type] || 'ℹ';
  t.innerHTML = '<span style="font-size:16px;flex-shrink:0">' + icon + '</span> <span>' + msg + '</span>';
  wrap.appendChild(t);
  setTimeout(() => {
    t.classList.add('out');
    setTimeout(() => t.remove(), 260);
  }, 2800);
}

function showUndoToast(msg, onUndo) {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast info';
  t.innerHTML = '<span style="font-size:16px;flex-shrink:0">ℹ</span><span>'+esc(msg)+'</span><button class="toast-action" type="button">Batal</button>';
  wrap.appendChild(t);
  let active = true;
  const timer = setTimeout(remove, 3000);
  function remove() { active=false; t.classList.add('out'); setTimeout(()=>t.remove(),260); }
  t.querySelector('button').addEventListener('click',()=>{ if(!active)return; clearTimeout(timer); active=false; onUndo(); t.remove(); });
}

function showAddAnotherToast(onAdd, onExpire) {
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast success';
  t.innerHTML = '<span style="font-size:16px;flex-shrink:0">✓</span><span>Post disimpan! Tambah lagi?</span><button class="toast-action" type="button">Tambah Lagi</button>';
  wrap.appendChild(t);
  let active = true;
  const timer = setTimeout(()=>remove(true),5000);
  function remove(expired) {
    if (!active) return;
    active=false;
    if (expired) onExpire();
    t.classList.add('out');
    setTimeout(()=>t.remove(),260);
  }
  t.querySelector('button').addEventListener('click',()=>{
    if(!active)return;
    clearTimeout(timer); active=false; onAdd(); t.remove();
  });
}

/* ===== EXPORT / IMPORT ===== */
function exportCSV() {
  const hdrs = ['ID','Platform','Tajuk','Caption','Tarikh','Masa','Pillar','Status','Approved','Notes'];
  const rows = state.posts.map(p => [
    p.id, PLATFORM_NAMES[p.platform]||p.platform,
    (p.title||'').replace(/"/g,'""'),
    (p.caption||'').replace(/[\n\r]/g,' ').replace(/"/g,'""').slice(0,200),
    p.date||'', p.time||'', p.pillar||'', p.status||'draft',
    p.approved?'Ya':'Tidak',
    (p.notes||'').replace(/[\n\r]/g,' ').replace(/"/g,'""')
  ].map(v => '"'+v+'"').join(','));
  const csv = '﻿'+[hdrs.map(h=>'"'+h+'"').join(','), ...rows].join('\r\n');
  dlBlob(csv, 'text/csv', 'jomcontent-'+todayStr()+'.csv');
  showToast('CSV dieksport!','success');
}

function exportJSON() {
  const data = JSON.stringify({posts:state.posts,pillars:state.pillars,pillarColors:state.pillarColors,calDates:state.calDates,pillarTargets:state.pillarTargets},null,2);
  dlBlob(data, 'application/json', 'jomcontent-backup-'+todayStr()+'.json');
  showToast('Backup disimpan!','success');
}

function dlBlob(content, type, filename) {
  const url = URL.createObjectURL(new Blob([content],{type}));
  const a = Object.assign(document.createElement('a'),{href:url,download:filename});
  a.click(); URL.revokeObjectURL(url);
}

function triggerImport() { document.getElementById('importFile').click(); }

function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!Array.isArray(d.posts)) throw new Error('invalid');
      if (!confirm('Import '+d.posts.length+' posts? Data sedia ada akan digantikan.')) return;
      state.posts = d.posts;
      state.pillars = d.pillars||{};
      state.pillarColors = d.pillarColors||{};
      state.calDates = d.calDates||{};
      state.pillarTargets = d.pillarTargets||{};
      PLATFORMS.forEach(p=>{
        if(!state.pillars[p]) state.pillars[p]=[...DEFAULT_PILLARS];
        if(!state.calDates[p]) state.calDates[p]=getDateKey(new Date());
        if(!state.pillarTargets[p]) state.pillarTargets[p]={...DEFAULT_TARGETS};
      });
      saveState(); renderAll();
      showToast(d.posts.length+' posts diimport!','success');
    } catch(err) { showToast('Format fail tidak sah.','error'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}

/* ===== PLATFORM TAB HTML ===== */
function renderPlatformTab(platform) {
  const name = PLATFORM_NAMES[platform];
  document.getElementById('tab-'+platform).innerHTML = `
  <div class="section">
    <div class="section-hdr">
      <h2>${name} — Content Calendar</h2>
      <div class="section-hdr-right">
        <div class="search-wrap inline" style="margin:0;flex:1;min-width:0"><input class="search-input" id="search-${platform}" placeholder="Cari post..." oninput="debounceSearch('${platform}')"></div>
        <button class="btn btn-primary btn-sm" onclick="openModal('${platform}')">+ Tambah Post</button>
      </div>
    </div>
    <div class="cal-nav">
      <button onclick="calPrev('${platform}')">&#8249; Sebelum</button>
      <h3 id="calTitle-${platform}"></h3>
      <button onclick="calNext('${platform}')">Seterusnya &#8250;</button>
    </div>
    <div id="calGrid-${platform}" class="cal-grid"></div>
  </div>
  <div class="section">
    <div class="section-hdr"><h2>Content Pillars</h2><span class="badge" id="pillarCount-${platform}">0</span></div>
    <div id="pillarArea-${platform}"></div>
    <div id="filterBar-${platform}" class="filter-bar"></div>
    <div class="pillar-add-row">
      <input type="text" id="newPillar-${platform}" placeholder="Nama pillar..." style="width:140px">
      <input type="number" id="newPillarTarget-${platform}" placeholder="Target %" min="1" max="100" style="width:80px">
      <button class="btn btn-outline btn-sm" onclick="addPillar('${platform}')">+ Tambah</button>
    </div>
  </div>
  <div class="section">
    <div class="section-hdr"><h2>Post Bulan Ini</h2><span class="badge" id="postCount-${platform}">0</span></div>
    <div id="postList-${platform}" class="post-list"></div>
  </div>`;
}

/* ===== PILLARS ===== */
function addPillar(platform) {
  const inp = document.getElementById('newPillar-'+platform);
  const tinp = document.getElementById('newPillarTarget-'+platform);
  const name = inp.value.trim();
  if (!name) { showToast('Sila masukkan nama pillar.','error'); return; }
  if (!state.pillars[platform]) state.pillars[platform] = [...DEFAULT_PILLARS];
  if (state.pillars[platform].includes(name)) { showToast('Pillar sudah ada.','error'); return; }
  state.pillars[platform].push(name);
  const tv = parseInt(tinp.value);
  if (tv > 0 && tv <= 100) {
    if (!state.pillarTargets[platform]) state.pillarTargets[platform] = {...DEFAULT_TARGETS};
    state.pillarTargets[platform][name] = tv;
  }
  inp.value = ''; tinp.value = '';
  saveState();
  showToast('Pillar "'+name+'" ditambah!','success');
  renderAll();
}

function removePillar(platform, name) {
  if (!confirm('Padam pillar "'+name+'"?')) return;
  state.pillars[platform] = state.pillars[platform].filter(p => p !== name);
  if (state.pillarFilters[platform] === name) state.pillarFilters[platform] = 'all';
  saveState();
  showToast('Pillar dipadam.','info');
  renderAll();
}

function changePillarColor(name, color) {
  state.pillarColors[name] = color;
  saveState(); renderAll();
}

let draggedPillar = null;
function pillarDragStart(event, platform, name) {
  draggedPillar = {platform,name}; event.currentTarget.classList.add('dragging');
  event.dataTransfer.effectAllowed = 'move'; event.dataTransfer.setData('text/plain',name);
}
function pillarDragOver(event) { event.preventDefault(); event.dataTransfer.dropEffect='move'; event.currentTarget.classList.add('drag-over'); }
function pillarDragEnd(event) { event.currentTarget.classList.remove('dragging'); document.querySelectorAll('.pillar-tag.drag-over').forEach(el=>el.classList.remove('drag-over')); }
function pillarDrop(event, platform, targetName) {
  event.preventDefault();
  if (!draggedPillar || draggedPillar.platform!==platform || draggedPillar.name===targetName) return pillarDragEnd(event);
  const list=state.pillars[platform], from=list.indexOf(draggedPillar.name), to=list.indexOf(targetName);
  if(from<0||to<0)return;
  const [item]=list.splice(from,1); list.splice(to,0,item); draggedPillar=null; saveState(); renderAll();
}

/* ===== MODAL ===== */
let modalSession = 0;
function openModal(platform, postId, prefillDate) {
  modalSession++;
  const overlay = document.getElementById('postModal');
  setFieldError('mTitle','mTitleError',false);
  setFieldError('mDate','mDateError',false);
  overlay.classList.add('open');
  document.getElementById('mPlatform').value = platform || state.currentTab;
  const p = document.getElementById('mPlatform').value;
  const sel = document.getElementById('mPillar');
  sel.innerHTML = '';
  (state.pillars[p] || DEFAULT_PILLARS).forEach(x => {
    const o = document.createElement('option');
    o.value = x; o.textContent = x; sel.appendChild(o);
  });
  if (postId) {
    const post = state.posts.find(x => x.id === postId);
    if (!post) { overlay.classList.remove('open'); return; }
    document.getElementById('modalTitle').textContent = 'Edit Post';
    document.getElementById('mPostId').value = postId;
    document.getElementById('mTitle').value = post.title || '';
    document.getElementById('mCaption').value = post.caption || '';
    document.getElementById('mDate').value = post.date || '';
    document.getElementById('mTime').value = post.time || '';
    sel.value = post.pillar || '';
    document.getElementById('mStatus').value = post.status || 'draft';
    document.getElementById('mNotes').value = post.notes || '';
    document.getElementById('mApproved').checked = !!post.approved;
    document.getElementById('mDeleteBtn').style.display = 'block';
    document.getElementById('mDupeBtn').style.display = 'block';
    _modalImages = post.images ? JSON.parse(JSON.stringify(post.images)) : [];
    renderMediaPreview(_modalImages);
  } else {
    document.getElementById('modalTitle').textContent = 'Tambah Post';
    document.getElementById('mPostId').value = '';
    document.getElementById('mTitle').value = '';
    document.getElementById('mCaption').value = '';
    document.getElementById('mDate').value = prefillDate || todayStr();
    document.getElementById('mTime').value = '12:00';
    sel.value = (state.pillars[p] || DEFAULT_PILLARS)[0] || '';
    document.getElementById('mStatus').value = 'draft';
    document.getElementById('mNotes').value = '';
    document.getElementById('mApproved').checked = false;
    document.getElementById('mDeleteBtn').style.display = 'none';
    document.getElementById('mDupeBtn').style.display = 'none';
    _modalImages = [];
    renderMediaPreview([]);
  }
  setTimeout(() => document.getElementById('mTitle').focus(), 50);
}

function closeModal() { document.getElementById('postModal').classList.remove('open'); }

function setFieldError(inputId, messageId, hasError) {
  const input = document.getElementById(inputId);
  const message = document.getElementById(messageId);
  input.classList.toggle('field-error', hasError);
  input.setAttribute('aria-invalid', hasError ? 'true' : 'false');
  message.classList.toggle('visible', hasError);
}

function savePost() {
  const id = document.getElementById('mPostId').value;
  const platform = document.getElementById('mPlatform').value;
  const title = document.getElementById('mTitle').value.trim();
  const date = document.getElementById('mDate').value;
  setFieldError('mTitle','mTitleError',!title);
  setFieldError('mDate','mDateError',!date);
  if (!title || !date) {
    (!title ? document.getElementById('mTitle') : document.getElementById('mDate')).focus();
    showToast('Sila lengkapkan medan wajib.','error');
    return;
  }
  const data = {
    title, date,
    caption: document.getElementById('mCaption').value.trim(),
    time: document.getElementById('mTime').value,
    pillar: document.getElementById('mPillar').value,
    status: document.getElementById('mStatus').value,
    notes: document.getElementById('mNotes').value.trim(),
    approved: document.getElementById('mApproved').checked,
    images: window._modalImages || [],
  };
  const addAgainValues = {platform,date,time:data.time,pillar:data.pillar,status:data.status};
  const savedModalSession = modalSession;
  if (id) {
    const idx = state.posts.findIndex(x => x.id === id);
    if (idx >= 0) {
      state.posts[idx] = {...state.posts[idx], ...data};
      apiSyncPost(state.posts[idx], 'PUT');
    }
  } else {
    data.id = Date.now()+'_'+Math.random().toString(36).slice(2,7);
    data.platform = platform;
    state.posts.push(data);
    apiSyncPost(data, 'POST');
  }
  saveState(); renderAll();
  showAddAnotherToast(()=>{
    openModal(addAgainValues.platform,null,addAgainValues.date);
    document.getElementById('mTime').value = addAgainValues.time;
    document.getElementById('mPillar').value = addAgainValues.pillar;
    document.getElementById('mStatus').value = addAgainValues.status;
  }, ()=>{ if (modalSession === savedModalSession) closeModal(); });
}

function deletePost() {
  const id = document.getElementById('mPostId').value;
  if (!id || !confirm('Padam post ini?')) return;
  const index = state.posts.findIndex(x => x.id === id);
  const post = state.posts[index];
  if (!post) return;
  state.posts = state.posts.filter(x => x.id !== id);
  saveState(); closeModal(); renderAll();
  let undone = false;
  const deleteTimer = setTimeout(()=>{ if(!undone) apiSyncPost(post, 'DELETE'); },3000);
  showUndoToast('Post dipadam.',()=>{
    undone=true; clearTimeout(deleteTimer); state.posts.splice(Math.min(index,state.posts.length),0,post);
    saveState(); renderAll(); showToast('Post dipulihkan.','success');
  });
}

function handleImageUpload(event) {
  const files = event.target.files;
  if (!files.length) return;
  const promises = Array.from(files).map(f => new Promise(resolve => {
    const r = new FileReader();
    r.onload = e => resolve({src: e.target.result, name: f.name, type: 'image'});
    r.readAsDataURL(f);
  }));
  Promise.all(promises).then(results => {
    _modalImages = [...(_modalImages||[]), ...results];
    renderMediaPreview(_modalImages);
    event.target.value = '';
  });
}

/* ===== CALENDAR ===== */
function getMonthDays(year, month) {
  const first = new Date(year,month,1).getDay();
  const last = new Date(year,month+1,0).getDate();
  const prevLast = new Date(year,month,0).getDate();
  const days = [];
  for (let i=first-1;i>=0;i--) days.push({day:prevLast-i,other:true,date:new Date(year,month-1,prevLast-i)});
  for (let i=1;i<=last;i++) days.push({day:i,other:false,date:new Date(year,month,i)});
  for (let i=days.length;i<42;i++) days.push({day:i-last+1,other:true,date:new Date(year,month+1,i-last+1)});
  return days;
}

function renderCalendar(platform) {
  const key = state.calDates[platform] || getDateKey(new Date());
  const {year,month} = parseDateKey(key);
  const days = getMonthDays(year,month);
  const grid = document.getElementById('calGrid-'+platform);
  const titleEl = document.getElementById('calTitle-'+platform);
  if (!grid || !titleEl) return;
  titleEl.textContent = new Date(year,month).toLocaleString('ms-MY',{month:'long',year:'numeric'});
  const today = todayStr();
  const platformPosts = state.posts.filter(p => p.platform === platform);
  const filterPillar = state.pillarFilters[platform] || 'all';
  const DAYS = ['Ah','Is','Se','Ra','Kh','Ju','Sa'];
  let html = DAYS.map(d=>`<div class="cal-day-header">${d}</div>`).join('');
  days.forEach(d => {
    const ds = localDateStr(d.date);
    const isToday = ds === today;
    const dayPosts = platformPosts.filter(p => p.date===ds && (filterPillar==='all'||p.pillar===filterPillar));
    const shown = dayPosts.slice(0,3);
    const more = dayPosts.length - 3;
    let cls = 'cal-day'+(d.other?' other-month':'')+(isToday?' today':'');
    let chips = shown.map(p =>
      `<span class="post-chip status-${p.status||'draft'}" style="background:${getPillarColor(p.pillar)}" onclick="event.stopPropagation();openModal('${platform}','${p.id}')">${esc(p.title||'Post')}</span>`
    ).join('');
    if (more > 0) chips += `<div class="more-chip">+${more} lagi</div>`;
    html += `<div class="${cls}" onclick="openModal('${platform}',null,'${ds}')"><button class="cal-add-btn" type="button" aria-label="Tambah post pada ${ds}" onclick="event.stopPropagation();openModal('${platform}',null,'${ds}')">+</button><div class="day-num">${d.day}</div>${chips}</div>`;
  });
  grid.innerHTML = html;
  if (grid.dataset.slidePending === 'true') {
    grid.dataset.slidePending = 'false';
    requestAnimationFrame(() => grid.classList.remove('cal-slide'));
  }
}

function startCalendarSlide(platform, direction) {
  const grid = document.getElementById('calGrid-'+platform);
  if (!grid) return;
  grid.style.setProperty('--cal-slide-x', direction * 18 + 'px');
  grid.classList.add('cal-slide');
  grid.dataset.slidePending = 'true';
}

function calPrev(platform) {
  startCalendarSlide(platform, -1);
  const {year,month} = parseDateKey(state.calDates[platform]||getDateKey(new Date()));
  state.calDates[platform] = getDateKey(new Date(year,month-1,1));
  saveState(); renderAll();
}
function calNext(platform) {
  startCalendarSlide(platform, 1);
  const {year,month} = parseDateKey(state.calDates[platform]||getDateKey(new Date()));
  state.calDates[platform] = getDateKey(new Date(year,month+1,1));
  saveState(); renderAll();
}

function drawChart(canvasId, posts, groupBy) {
  const canvas=document.getElementById(canvasId);
  if (!canvas) return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const w=Math.max((canvas.parentElement.getBoundingClientRect().width||260)-40,180);
  const h=200;
  canvas.width=w*dpr; canvas.height=h*dpr;
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  const counts={};
  posts.forEach(p => { const k=groupBy==='platform'?p.platform:p.pillar; if(k) counts[k]=(counts[k]||0)+1; });
  const entries=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const total=entries.reduce((s,e)=>s+e[1],0)||1;
  const text2=cssVar('--text2')||'#888';
  if (!entries.length) {
    ctx.fillStyle=text2; ctx.font='13px sans-serif'; ctx.textAlign='center';
    ctx.fillText('Tiada data',w/2,h/2); return;
  }
  if (groupBy==='platform') {
    const size=Math.min(w,h); const cx=size/2, cy=size/2, r=cx-12;
    canvas.width=size*dpr; canvas.height=size*dpr;
    canvas.style.width=size+'px'; canvas.style.height=size+'px';
    ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,size,size);
    let ang=-Math.PI/2;
    entries.forEach(([key,val])=>{
      const slice=(val/total)*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(cx,cy);
      ctx.arc(cx,cy,r,ang,ang+slice); ctx.closePath();
      ctx.fillStyle=PLATFORM_COLORS[key]||'#aaa'; ctx.fill();
      if (slice>0.25) {
        const mid=ang+slice/2;
        ctx.fillStyle='#fff'; ctx.font='bold 11px sans-serif';
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(val,cx+Math.cos(mid)*r*0.65,cy+Math.sin(mid)*r*0.65);
      }
      ang+=slice;
    });
    ctx.beginPath(); ctx.arc(cx,cy,r*0.42,0,Math.PI*2);
    ctx.fillStyle=cssVar('--surface')||'#fff'; ctx.fill();
    ctx.fillStyle=cssVar('--text')||'#000'; ctx.font='bold 15px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(total,cx,cy-8);
    ctx.font='11px sans-serif'; ctx.fillStyle=text2; ctx.fillText('posts',cx,cy+10);
  } else {
    const maxV=Math.max(...entries.map(e=>e[1]),1);
    const ch=h-64;
    const bw=(w-20)/Math.max(entries.length,1);
    const textC=cssVar('--text')||'#000';
    entries.forEach(([key,val],i)=>{
      const bh=(val/maxV)*ch;
      const x=10+i*bw+bw*0.15;
      ctx.fillStyle=getPillarColor(key);
      ctx.beginPath();
      ctx.roundRect(x,ch-bh+10,bw*0.7,bh,[4,4,0,0]);
      ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 13px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=3;
      const numY=bh>24 ? ch-bh/2+10 : ch-bh-6;
      ctx.fillText(val,x+bw*0.35,numY);
      ctx.shadowColor='transparent'; ctx.shadowBlur=0;
      ctx.fillStyle=text2; ctx.font='10px sans-serif'; ctx.textBaseline='top';
      const lbl=key.length>9?key.slice(0,9)+'…':key;
      ctx.fillText(lbl,x+bw*0.35,ch+14);
    });
  }
}

  const container=document.getElementById('dashTimeline');
  if (!container) return;
  const now=new Date(), y=now.getFullYear(), m=now.getMonth();
  const q=(document.getElementById('dashSearch')||{value:''}).value.trim().toLowerCase();
  let posts=state.posts.filter(p=>{const pd=parseLocalDate(p.date);return pd.getFullYear()===y&&pd.getMonth()===m;});
  if (q) posts=posts.filter(p=>(p.title||'').toLowerCase().includes(q)||(PLATFORM_NAMES[p.platform]||'').toLowerCase().includes(q)||(p.pillar||'').toLowerCase().includes(q));
  const totalEl=document.getElementById('dashTotalPosts');
  if (totalEl) totalEl.textContent=posts.length;
  const sorted=[...posts].sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||''));
  if (!sorted.length) {
    container.innerHTML='<div class="empty-state">'+'<div class="icon"><svg width="64" height="64" viewBox="0 0 64 64" fill="none"><rect x="12" y="8" width="40" height="30" rx="4" stroke="#c4c4d4" stroke-width="2" fill="#f0f0f8"/><rect x="18" y="16" width="8" height="8" rx="4" fill="#d0d0e0"/><rect x="30" y="16" width="16" height="4" rx="2" fill="#d0d0e0"/><rect x="30" y="22" width="12" height="4" rx="2" fill="#d0d0e0"/><rect x="18" y="30" width="28" height="3" rx="1.5" fill="#d0d0e0"/><circle cx="32" cy="50" r="12" stroke="#c4c4d4" stroke-width="2" fill="#f0f0f8"/><path d="M28 52l3 3 5-7" stroke="#a0a0c0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><p>'+(q?'Tiada post sepadan.':'Tiada post — tambah di mana-mana platform!')+'</p><button class="btn btn-primary btn-sm" onclick="openModal(\'tiktok\')">+ Tambah Post</button></div>';
    return;
  }
  const STATUS_LABEL={draft:'Draft',scheduled:'Scheduled',posted:'Posted',failed:'Failed'};
  container.innerHTML=sorted.map(p=>`
    <div class="post-item" onclick="openModal('${p.platform}','${p.id}')">
      <div class="p-date">${formatDate(p.date)}${p.time?' '+p.time.slice(0,5):''}</div>
      <div class="p-title"><span class="p-dot" style="background:${PLATFORM_COLORS[p.platform]||'#999'}"></span>${mediaIndicator(p.images)}${esc(p.title||'Untitled')}</div>
      <span class="p-pillar" style="background:${getPillarColor(p.pillar)}">${esc(p.pillar||'-')}</span>
      <span class="p-status status-${p.status||'draft'}">${STATUS_LABEL[p.status||'draft']}</span>
    </div>`).join('');
}

/* ===== SIDEBAR TOGGLE ===== */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

/* ===== NAV & THEME ===== */
function initNav() {
  document.querySelectorAll('.nav-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
      btn.classList.add('active');
      state.currentTab = btn.dataset.tab;
      document.getElementById('tab-'+state.currentTab).classList.add('active');
      const titleEl = document.getElementById('pageTitle');
      if (titleEl) titleEl.textContent = PAGE_TITLES[state.currentTab] || state.currentTab;
      if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('open');
      }
      renderAll();
    });
  });
}

function initTheme() {
  const btn=document.getElementById('themeToggle');
  const saved=localStorage.getItem('jomContentTheme')||'light';
  document.documentElement.setAttribute('data-theme',saved);
  btn.textContent=saved==='dark'?'☀️':'🌙';
  btn.addEventListener('click',()=>{
    const cur=document.documentElement.getAttribute('data-theme');
    const next=cur==='dark'?'light':'dark';
    document.documentElement.setAttribute('data-theme',next);
    localStorage.setItem('jomContentTheme',next);
    btn.textContent=next==='dark'?'☀️':'🌙';
    btn.classList.remove('spinning'); void btn.offsetWidth; btn.classList.add('spinning');
    renderDashboard();
  });
}

/* ===== KEYBOARD SHORTCUTS ===== */
function initKeyboard() {
  document.addEventListener('keydown', e => {
    if (e.key==='Escape') { closePostPreview(); closeModal(); return; }
    const inField = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName);
    if (inField) return;
    if ((e.ctrlKey||e.metaKey) && e.key==='n') {
      e.preventDefault();
      const platform = PLATFORMS.includes(state.currentTab) ? state.currentTab : PLATFORMS[0];
      openModal(platform);
    }
  });
}

/* ===== SCROLL ANIMATIONS ===== */
function initScrollAnimations() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.section, .card-grid > .card').forEach(function(el) {
    el.classList.add('animate-on-scroll');
    observer.observe(el);
  });
}

/* ===== RENDER ALL ===== */
function renderAll() {
  if (state.currentTab==='dashboard') {
    renderDashboard();
  } else if (PLATFORMS.includes(state.currentTab)) {
    renderCalendar(state.currentTab);
    renderPillars(state.currentTab);
    renderPostList(state.currentTab);
  }
}

/* ===== INIT ===== */
document.addEventListener('DOMContentLoaded', () => {
  initScrollAnimations();
  loadState();
  initTheme();
  initNav();
  PLATFORMS.forEach(p => renderPlatformTab(p));
  document.getElementById('postModal').addEventListener('click', e => {
    if (e.target === document.getElementById('postModal')) closeModal();
  });
  document.getElementById('mTitle').addEventListener('input', e => {
    if (e.target.value.trim()) setFieldError('mTitle','mTitleError',false);
  });
  document.getElementById('mDate').addEventListener('input', e => {
    if (e.target.value) setFieldError('mDate','mDateError',false);
  });
  initKeyboard();
  renderAll();
  // Sync from API (silent fallback if KV not bound yet)
  setTimeout(apiFetchAll, 500);
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { if(state.currentTab==='dashboard') renderDashboard(); }, 200);
  });
});
</script>
</body>
